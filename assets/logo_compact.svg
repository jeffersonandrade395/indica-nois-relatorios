<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 64" width="280" height="64">
  <!-- Versão Compacta Indica Nóis - sem tagline -->
  <defs>
    <style>
      .mark-bg { fill: #F04E23; }
      .mark-text { fill: #FFFFFF; font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 30px; letter-spacing: -1px; }
      .wordmark { fill: #1A1A1A; font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 28px; letter-spacing: -0.5px; }
    </style>
  </defs>

  <rect x="0" y="0" width="64" height="64" rx="14" class="mark-bg"/>
  <text x="32" y="44" text-anchor="middle" class="mark-text">IN</text>
  <text x="80" y="42" class="wordmark">Indica Nóis</text>
</svg>
